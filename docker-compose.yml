services:
  db:
    image: postgres:15-alpine
    container_name: bosta_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bosta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bosta_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bosta
      - JWT_SECRET=bosta_secret
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=bosta_secret
      - JWT_REFRESH_EXPIRES_IN=30d
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
